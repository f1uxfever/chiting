name: Build Cheat Menu Mod

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - name: Find and compile Java files
        run: |
          mkdir -p build/classes
          find src -name "*.java" -type f > /tmp/sources.txt
          if [ -s /tmp/sources.txt ]; then
            javac -d build/classes -encoding UTF-8 @/tmp/sources.txt
          fi
      
      - name: Create JAR
        run: |
          mkdir -p build/libs
          if [ -d build/classes ]; then
            cd build/classes
            jar -cvf ../libs/cheatmenu-1.0.0.jar .
            cd ../..
          fi
      
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: cheatmenu-1.0.0.jar
          path: build/libs/cheatmenu-1.0.0.jar
        if: always()
